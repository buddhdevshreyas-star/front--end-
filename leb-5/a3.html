<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("enter a arry size : "));
        let a=[];
        let i,j,temp;
       
        for(i=0;i<n;i++){
            a[i]=parseInt(prompt("enter a element : "));

        }
        document.write(a);
       for(i=0;i<n;i++){
          for(j=0;j<n-1-i;j++){
            if(a[j]>a[j+1]){
                temp=a[j];
                a[j]=a[j+1];
                a[j+1]=temp;

            }

          }
        }
        document.write("</br>")
        document.write("sorted array---->>> ");
        document.write("</br>")
        document.write(a);

    </script>

    
</body>
</html>
