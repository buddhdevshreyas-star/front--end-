<script>

    // Original array
    let arr = [10, 20, 30, 40, 50];
    document.write("Original Array = " + arr + "<br>");

    // push() adds a value at the end of the array
    arr.push(30);
    document.write("After Push = " + arr + "<br>");

    // pop() removes the last value from the array
    arr.pop();
    document.write("After Pop = " + arr + "<br>");

    // unshift() adds a value at the beginning of the array
    arr.unshift(10);
    document.write("After Unshift = " + arr + "<br>");

    // shift() removes the first value from the array
    arr.shift();
    document.write("After Shift = " + arr + "<br>");
    //spilece replace the given index and replace thier
    arr.splice(2,1,25)
     document.write("After spilce= " + arr + "<br>");
     arr.sort()
     document.write("After sort= " + arr + "<br>");   
</script>
