<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n= parseInt(prompt("enter the number n"))
        let i
        let j
        let flag=0
        for(i=1;i<=n;i++){
            for(j=1;j<=i;j++){
                if(flag==1){
                    flag=0;
                }
                else if(flag==0){
                    flag=1
                }
                document.write(flag)
            }
            document.write("</br>")
        }
    </script>
</body>
</html>
