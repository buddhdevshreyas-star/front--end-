<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=['sunday','monday','tuesday','wensday','thersday','friday','satrday']
        let d = new Date();
        document.write("Date & Time = " + d + "<br>");
        document.write("Date = " + d.getDate() + "<br>");
        document.write("Date = " + d.getMonth()+ "<br>");
        document.write("year = " + d.getYear()+ "<br>");
        document.write("full year = " + d.getFullYear()+ "<br>");
        document.write("gettime="+d.getTime()+"</br>");
        document.write(n[d.getDay()])
    </script>
</body>
</html>
