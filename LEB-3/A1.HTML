<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseInt(prompt("ennter the number:"))
        let b=parseInt(prompt("enter the number"))
        let choic=prompt("enter the your choise (%,/,-,*,+)")
        let ans
        if(choic=="*"){
             ans=a*b;
        }
        else if(choic=="/"){
             ans=a/b;
        }
         else if(choic=="+"){
             ans=a+b;
        }
        else if(choic=="-"){
             ans=a-b;
        }
        else{
            alert("inevalid choise")
        }
        alert("ans"+ans)
    </script>
</body>
</html>
